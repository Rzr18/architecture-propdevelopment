apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: user-developer
    namespace: default
roleRef:
  kind: Role
  name: role-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: user-devops
    namespace: default
roleRef:
  kind: Role
  name: role-writer
  apiGroup: rbac.authorization.k8s.io